<div class="min-h-screen bg-slate-50 pt-24 md:pt-32 pb-16 px-4 md:px-8">
  <div class="max-w-[800px] mx-auto">
    <!-- Header -->
    <div class="mb-10 text-center">
      <div class="w-16 h-16 rounded-2xl bg-[#0a8f96]/10 flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-[#0a8f96]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </div>
      <h1 class="text-3xl md:text-4xl font-black text-gray-900 mb-3">{{ 'PROFILE.PROPERTY_ALERTS' | translate }}</h1>
      <p class="text-slate-500 font-bold max-w-lg mx-auto leading-relaxed">
        {{ 'PROFILE.PROPERTY_ALERTS_DESC' | translate }}
      </p>
    </div> 

    @if (loading()) {
      <div class="flex justify-center py-20">
        <div class="w-10 h-10 border-4 border-[#0a8f96] border-t-transparent rounded-full animate-spin"></div>
      </div>
    } @else {
      <form (ngSubmit)="save()" class="space-y-8">
        
        <!-- Basic Info Card -->
        <div class="bg-white rounded-[32px] p-6 md:p-10 shadow-sm border border-slate-100">
          <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
            <span class="w-2 h-8 bg-[#0a8f96] rounded-full block"></span>
            {{ 'PROPERTIES.BASIC_INFO' | translate }}
          </h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.PROPERTY_TYPE' | translate }}</label>
              <select name="propertyType" [(ngModel)]="form.propertyType" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-[#0a8f96] focus:border-[#0a8f96] px-4 font-bold outline-none transition-all">
                <option [ngValue]="null">{{ 'COMMON.ANY' | translate }}</option>
                @for (type of propertyTypes; track type) {
                  <option [value]="type">{{ 'PROPERTIES.TYPES.' + type | translate }}</option>
                }
              </select>
            </div>
            
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.LISTING_TYPE' | translate }}</label>
              <select name="listingType" [(ngModel)]="form.listingType" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-[#0a8f96] focus:border-[#0a8f96] px-4 font-bold outline-none transition-all">
                <option [ngValue]="null">{{ 'COMMON.ANY' | translate }}</option>
                @for (type of listingTypes; track type) {
                  <option [value]="type">{{ 'PROPERTIES.LISTING_TYPES.' + type | translate }}</option>
                }
              </select>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.CITY' | translate }}</label>
              <input type="text" name="city" [(ngModel)]="form.city" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-[#0a8f96] focus:border-[#0a8f96] px-4 font-bold outline-none transition-all placeholder:text-slate-400 placeholder:font-medium" placeholder="{{ 'COMMON.ANY' | translate }}">
            </div>
            
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.DISTRICT' | translate }}</label>
              <input type="text" name="district" [(ngModel)]="form.district" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-[#0a8f96] focus:border-[#0a8f96] px-4 font-bold outline-none transition-all placeholder:text-slate-400 placeholder:font-medium" placeholder="{{ 'COMMON.ANY' | translate }}">
            </div>
          </div>
        </div>

        <!-- Budget & Size Card -->
        <div class="bg-white rounded-[32px] p-6 md:p-10 shadow-sm border border-slate-100">
          <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
            <span class="w-2 h-8 bg-blue-500 rounded-full block"></span>
            {{ 'PROFILE.BUDGET_AND_SIZE' | translate }}
          </h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-8">
            <div class="space-y-4">
              <label class="block text-sm font-bold text-slate-700">{{ 'PROPERTIES.PRICE' | translate }}</label>
              <div class="flex items-center gap-3">
                <input type="number" name="minPrice" [(ngModel)]="form.minPrice" placeholder="{{ 'COMMON.MIN' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
                <span class="text-slate-400 font-bold">-</span>
                <input type="number" name="maxPrice" [(ngModel)]="form.maxPrice" placeholder="{{ 'COMMON.MAX' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
              </div>
            </div>

            <div class="space-y-4">
              <label class="block text-sm font-bold text-slate-700">{{ 'PROPERTIES.AREA_SQM' | translate }}</label>
              <div class="flex items-center gap-3">
                <input type="number" name="minArea" [(ngModel)]="form.minArea" placeholder="{{ 'COMMON.MIN' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
                <span class="text-slate-400 font-bold">-</span>
                <input type="number" name="maxArea" [(ngModel)]="form.maxArea" placeholder="{{ 'COMMON.MAX' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
              </div>
            </div>
            
            <div class="space-y-4">
              <label class="block text-sm font-bold text-slate-700">{{ 'PROPERTIES.BEDROOMS' | translate }}</label>
              <div class="flex items-center gap-3">
                <input type="number" name="minBedrooms" [(ngModel)]="form.minBedrooms" placeholder="{{ 'COMMON.MIN' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
                <span class="text-slate-400 font-bold">-</span>
                <input type="number" name="maxBedrooms" [(ngModel)]="form.maxBedrooms" placeholder="{{ 'COMMON.MAX' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
              </div>
            </div>

            <div class="space-y-4">
              <label class="block text-sm font-bold text-slate-700">{{ 'PROPERTIES.BATHROOMS' | translate }}</label>
              <div class="flex items-center gap-3">
                <input type="number" name="minBathrooms" [(ngModel)]="form.minBathrooms" placeholder="{{ 'COMMON.MIN' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
                <span class="text-slate-400 font-bold">-</span>
                <input type="number" name="maxBathrooms" [(ngModel)]="form.maxBathrooms" placeholder="{{ 'COMMON.MAX' | translate }}" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-blue-500 focus:border-blue-500 px-4 font-bold outline-none transition-all tabular-nums">
              </div>
            </div>
          </div>
        </div>

        <!-- Amenities Card -->
        <div class="bg-white rounded-[32px] p-6 md:p-10 shadow-sm border border-slate-100">
          <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
            <span class="w-2 h-8 bg-amber-500 rounded-full block"></span>
            {{ 'PROPERTIES.FEATURES_AMENITIES' | translate }}
          </h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.FURNISHING' | translate }}</label>
              <select name="furnishingStatus" [(ngModel)]="form.furnishingStatus" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-amber-500 focus:border-amber-500 px-4 font-bold outline-none transition-all">
                <option [ngValue]="null">{{ 'COMMON.ANY' | translate }}</option>
                @for (type of furnishingStatuses; track type) {
                  <option [value]="type">{{ 'PROPERTIES.FURNISHING_TYPES.' + type | translate }}</option>
                }
              </select>
            </div>
            
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">{{ 'PROPERTIES.VIEW_TYPE' | translate }}</label>
              <select name="viewType" [(ngModel)]="form.viewType" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-2xl focus:ring-amber-500 focus:border-amber-500 px-4 font-bold outline-none transition-all">
                <option [ngValue]="null">{{ 'COMMON.ANY' | translate }}</option>
                @for (type of viewTypes; track type) {
                  <option [value]="type">{{ 'PROPERTIES.VIEW_TYPES.' + type | translate }}</option>
                }
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasParking" [class.border-amber-200]="form.hasParking">
              <input type="checkbox" name="hasParking" [(ngModel)]="form.hasParking" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.PARKING' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasPool" [class.border-amber-200]="form.hasPool">
              <input type="checkbox" name="hasPool" [(ngModel)]="form.hasPool" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.POOL' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasGym" [class.border-amber-200]="form.hasGym">
              <input type="checkbox" name="hasGym" [(ngModel)]="form.hasGym" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.GYM' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasElevator" [class.border-amber-200]="form.hasElevator">
              <input type="checkbox" name="hasElevator" [(ngModel)]="form.hasElevator" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.ELEVATOR' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasSecurity" [class.border-amber-200]="form.hasSecurity">
              <input type="checkbox" name="hasSecurity" [(ngModel)]="form.hasSecurity" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.SECURITY' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasBalcony" [class.border-amber-200]="form.hasBalcony">
              <input type="checkbox" name="hasBalcony" [(ngModel)]="form.hasBalcony" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.BALCONY' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasGarden" [class.border-amber-200]="form.hasGarden">
              <input type="checkbox" name="hasGarden" [(ngModel)]="form.hasGarden" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.GARDEN' | translate }}</span>
            </label>
            <label class="flex items-center p-4 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-colors" [class.bg-amber-50]="form.hasCentralAC" [class.border-amber-200]="form.hasCentralAC">
              <input type="checkbox" name="hasCentralAC" [(ngModel)]="form.hasCentralAC" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-500">
              <span class="ltr:ml-3 rtl:mr-3 text-sm font-bold text-slate-700">{{ 'PROPERTIES.AMENITIES.CENTRAL_AC' | translate }}</span>
            </label>
          </div>
        </div>

        <div class="flex items-center justify-end gap-4 pt-6">
          <button type="submit" [disabled]="saving()" class="w-full md:w-auto px-8 h-14 bg-[#0a8f96] hover:bg-[#076b70] disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-2xl text-sm font-black shadow-lg shadow-[#0a8f96]/20 transition-all flex items-center justify-center gap-3">
            @if (saving()) {
              <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
              {{ 'COMMON.SAVING' | translate }}
            } @else {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              {{ 'COMMON.SAVE' | translate }}
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
